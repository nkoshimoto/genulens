name: Build and publish Python wheels

on:
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish built artifacts to TestPyPI"
        required: true
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Inspect Linux wheel dependencies
        if: runner.os == 'Linux'
        run: |
          python -m pip install auditwheel
          for wheel in wheelhouse/*.whl; do
            echo "::group::License notices in ${wheel}"
            unzip -l "$wheel" | grep -E 'dist-info/licenses/LICENSE|dist-info/licenses/third_party_licenses/GSL.md'
            echo "::endgroup::"
            echo "::group::Bundled GSL files in ${wheel}"
            unzip -l "$wheel" | grep -E 'libgsl|libgslcblas'
            echo "::endgroup::"
            echo "::group::auditwheel show ${wheel}"
            python -m auditwheel show "$wheel"
            echo "::endgroup::"
          done

      - name: Test Linux wheel in GSL-free slim container
        if: runner.os == 'Linux'
        run: |
          wheel="$(ls wheelhouse/genulens-*-cp311-*.whl | head -n 1)"
          docker run --rm \
            -v "$PWD/wheelhouse:/wheelhouse:ro" \
            python:3.11-slim \
            bash -lc "python -m pip install --upgrade pip && \
              python -m pip install /wheelhouse/$(basename "$wheel") && \
              python -c \"import genulens; cfg = genulens.Config(l=1.0, b=-3.9, n_simu=5, seed=1); result = genulens.simulate(cfg); assert result.to_numpy().shape[0] == 5; print('genulens slim-container smoke passed')\""

      - name: Inspect macOS wheel dependencies
        if: runner.os == 'macOS'
        run: |
          python -m pip install delocate
          for wheel in wheelhouse/*.whl; do
            echo "::group::License notices in ${wheel}"
            unzip -l "$wheel" | grep -E 'dist-info/licenses/LICENSE|dist-info/licenses/third_party_licenses/GSL.md'
            echo "::endgroup::"
            echo "::group::Bundled GSL files in ${wheel}"
            unzip -l "$wheel" | grep -E 'libgsl|libgslcblas|dylib'
            echo "::endgroup::"
            echo "::group::delocate-listdeps ${wheel}"
            deps="$(delocate-listdeps "$wheel")"
            echo "$deps"
            if echo "$deps" | grep -E '/opt/homebrew/lib/libgsl|/usr/local/lib/libgsl|/opt/homebrew/lib/libgslcblas|/usr/local/lib/libgslcblas'; then
              echo "Found unbundled Homebrew GSL dependency in ${wheel}" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Inspect sdist license notices
        run: |
          for sdist in dist/*.tar.gz; do
            tar -tzf "$sdist" | grep -E '(^|/)LICENSE$'
            tar -tzf "$sdist" | grep -E '(^|/)third_party_licenses/GSL.md$'
          done

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  testpypi:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_testpypi
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
